name: Daily Scan (7 PM IST)

on:
  schedule:
    - cron: '40 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run scanner
        run: node scripts/scan.mjs

      - name: Commit and push updated dashboard
        run: |
          git config user.name "trading-brain-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js journal.json
          if git diff --cached --quiet; then
            echo "No changes - market closed today"
          else
            git commit -m "Daily scan: $(TZ=Asia/Kolkata date +'%d %b %Y %H:%M IST')"
            git push
          fi

