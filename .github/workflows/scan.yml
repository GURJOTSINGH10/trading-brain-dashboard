name: Daily Scan (7 PM IST)

on:
  schedule:
    - cron: '45 13 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '0 2 * * 2-6'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run scanner
        run: node scripts/scan.mjs

      - name: Commit and push updated dashboard
        run: |
          git config user.name "trading-brain-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add -A
          if git diff --cached --quiet; then
            echo "No changes - already latest session"
          else
            git commit -m "Daily scan: $(TZ=Asia/Kolkata date +'%d %b %Y %H:%M IST')"
            git push
          fi
